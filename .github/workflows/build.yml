name: Build

on:
  workflow_call:
    inputs:
      cargo-build-args:
        required: false
        type: string
        default: ''
      upload-binary:
        required: false
        type: boolean
        default: false
      release:
        required: false
        type: boolean
        default: false
      require-patched-cargo:
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
      - name: Install tailwindcss
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
      - name: Build Tailwind CSS
        run: tailwindcss -i input.css -o assets/tailwind.css
      - name: Install Dioxus CLI
        run: |
          curl -sL "https://github.com/DioxusLabs/dioxus/releases/latest/download/dx-$(uname -m)-unknown-linux-gnu" -o /usr/local/bin/dx
          chmod +x /usr/local/bin/dx
      - name: Cargo check
        run: cargo check --all-features
      - name: Clippy
        run: cargo clippy --all-features --all-targets --no-deps -- -D warnings
      - name: DX Build
        env:
          DIOXUS_PUBLIC_DIR: public
        run: dx build --release