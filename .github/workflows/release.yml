name: Release

on:
  push:
    branches:
      - release

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    uses: ./.github/workflows/_release.yml
    with:
      binary-name: ${{ github.event.repository.name }}
      platforms: linux
      build-binaries: false
    secrets: inherit

  push-image:
    name: Docker Build & Push
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase repo owner
        id: repo
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Docker tags
        id: meta
        run: |
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "ghcr.io/${{ steps.repo.outputs.owner }}/${{ github.event.repository.name }}:latest" >> $GITHUB_OUTPUT
          if [ -n "${{ needs.release.outputs.tag }}" ]; then
            echo "ghcr.io/${{ steps.repo.outputs.owner }}/${{ github.event.repository.name }}:${{ needs.release.outputs.tag }}" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
